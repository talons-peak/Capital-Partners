kind = "web"
previewPath = "/"
title = "Private Equity Website"
version = "1.0.0"
id = "artifacts/pe-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21557

[services.development]
run = "pnpm --filter @workspace/pe-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pe-website", "run", "build" ]
publicDir = "artifacts/pe-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21557"
BASE_PATH = "/"
